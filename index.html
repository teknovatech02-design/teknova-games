<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>TEKNOVA GAMES</title>  

<style>  
body{  
  margin:0;  
  font-family:Arial;  
  background:linear-gradient(180deg,#0a0f1c,#05070d);  
  color:white;  
}  

/* NAVBAR */  
.navbar{  
  display:flex;  
  justify-content:space-between;  
  align-items:center;  
  padding:12px;  
  background:#000;  
}  

.title{  
  font-size:20px;  
  font-weight:bold;  
  background:linear-gradient(90deg,#00eaff,#ff7b00);  
  -webkit-background-clip:text;  
  -webkit-text-fill-color:transparent;  
}  

#search{  
  padding:6px;  
  border:none;  
  border-radius:5px;  
}  

/* LOGO SECTION */  
.logo{  
  text-align:center;  
  margin:15px 0;  
}  

.logo svg{  
  width:140px;  
  height:140px;  
  filter: drop-shadow(0 0 10px #00eaff);  
}  

/* GAME GRID */  
.games{  
  display:grid;  
  grid-template-columns:repeat(2,1fr);  
  gap:10px;  
  padding:10px;  
}  

.game{  
  background:#111827;  
  padding:10px;  
  border-radius:10px;  
  text-align:center;  
}  

.game img{  
  width:100%;  
  border-radius:10px;  
}  

button{  
  background:#ff7b00;  
  border:none;  
  padding:6px 10px;  
  border-radius:5px;  
  color:white;  
}  

/* GTA */  
.gta-card{  
  grid-column: span 2;  
  background:#0f172a;  
  padding:12px;  
  border-radius:12px;  
  text-align:center;  
}  

.gta-card img{  
  width:70%;  
  max-width:220px;  
  border-radius:10px;  
}  

.download-btn{  
  background:#22c55e;  
  color:black;  
  padding:8px 12px;  
  border-radius:8px;  
  display:inline-block;  
  margin-top:10px;  
  text-decoration:none;  
}  

/* TEAM */  
.team{  
  padding:20px;  
  text-align:center;  
}  

.team span{  
  color:#ff7b00;  
}  

.member{  
  background:#111827;  
  padding:15px;  
  border-radius:15px;  
  margin-top:10px;  
}  

.circle{  
  width:60px;  
  height:60px;  
  background:#ff7b00;  
  border-radius:50%;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  margin:auto;  
}  

/* SUPPORT */  
.support{  
  text-align:center;  
  padding:20px;  
}  

.whatsapp{  
  background:#25D366;  
  padding:10px;  
  border-radius:8px;  
  text-decoration:none;  
  color:black;  
}  

/* AD */  
.ad-overlay{  
  position:fixed;  
  top:0;  
  left:0;  
  width:100%;  
  height:100%;  
  background:black;  
  display:none;  
  flex-direction:column;  
  align-items:center;  
  justify-content:center;  
  z-index:9999;  
}  

.timer{  
  font-size:25px;  
  margin-bottom:20px;  
}  

.close-btn{  
  display:none;  
  background:red;  
  padding:10px;  
  border:none;  
  color:white;  
  border-radius:5px;  
}  
</style>  
</head>  

<body>  

<div class="navbar">  
  <div class="title">TEKNOVA GAMES</div>  
  <input type="text" id="search" placeholder="Search">  
</div>  

<!-- 🔥 AI LOGO (NO IMAGE LINK, ALWAYS WORKS) -->  
<div class="logo">  
<svg viewBox="0 0 200 200">  
  <defs>  
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">  
      <stop offset="0%" stop-color="#00eaff"/>  
      <stop offset="100%" stop-color="#ff7b00"/>  
    </linearGradient>  
  </defs>  

  <circle cx="100" cy="100" r="80" fill="url(#g1)" opacity="0.15"/>  
  <circle cx="100" cy="100" r="65" stroke="url(#g1)" stroke-width="4" fill="none"/>  

  <text x="50%" y="52%" text-anchor="middle" fill="url(#g1)" font-size="28" font-weight="bold">
    T
  </text>  

  <text x="50%" y="78%" text-anchor="middle" fill="white" font-size="10">
    TEKNOVA GAMES
  </text>  
</svg>  
</div>  

<div class="games">  

<div class="game" onclick="startAds('https://html5games.com/Game/Helix-Jump')">  
<img src="https://img.freepik.com/free-vector/game-background-design_23-2149007810.jpg">  
<p>Helix Jump</p>  
<button>Play</button>  
</div>  

<div class="game" onclick="startAds('https://html5games.com/Game/Flappy-Bird')">  
<img src="https://img.freepik.com/free-vector/arcade-game-background_23-2148997820.jpg">  
<p>Flappy Bird</p>  
<button>Play</button>  
</div>  

<div class="gta-card">  
<img src="https://upload.wikimedia.org/wikipedia/en/c/c4/GTASABOX.jpg">  
<h3>GTA SAN ANDREAS APK</h3>  

<a class="download-btn" onclick="startAds('https://www.mediafire.com/file/jrfxybfgmx3ggau/GTA_San_Andreas_2.11.306_Mod_-_RisTechy.com.apk/file?dkey=qj07wxnkf99&r=1729')">  
Download  
</a>  
</div>  

</div>  

<!-- TEAM -->  
<div class="team">  
<h2>MEET THE <span>TEAM</span></h2>  

<div class="member">  
<div class="circle">T</div>  
<h3>TEKNOVA</h3>  
<p>Founder</p>  
</div>  

<div class="member">  
<div class="circle">N</div>  
<h3>NOVA KING</h3>  
<p>Co-Developer</p>  
</div>

<p>Lead Developer</p>  
</div>  

</div>

<div class="support">

</div>  

<!-- AD SCREEN -->  
<div class="ad-overlay" id="adBox">  
  <div class="timer" id="timer">35</div>  
  <button class="close-btn" id="closeBtn">X Close</button>  
</div>  

<script>  

document.getElementById("search").addEventListener("keyup", function(){  
let value = this.value.toLowerCase();  
document.querySelectorAll(".game, .gta-card").forEach(g=>{  
g.style.display = g.innerText.toLowerCase().includes(value) ? "block":"none";  
});  
});  

let ad = "https://omg10.com/4/10857803";  
let nextUrl = "";  

function startAds(url){  
  nextUrl = url;  
  document.getElementById("adBox").style.display="flex";  

  window.open(ad,"_blank");  

  setTimeout(()=>{  
    window.open(ad,"_blank");  
  },3000);  

  startTimer();  
}  

function startTimer(){  
  let time = 35;  
  let timer = document.getElementById("timer");  
  let btn = document.getElementById("closeBtn");  

  let interval = setInterval(()=>{  
    time--;  
    timer.innerText = time;  

    if(time <= 0){  
      clearInterval(interval);  
      btn.style.display="block";  
    }  
  },1000);  
}  

document.getElementById("closeBtn").onclick=function(){  
  document.getElementById("adBox").style.display="none";  
  window.location.href = nextUrl;  
};  

</script>  

</body>
