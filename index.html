<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEKNOVA GAMES</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#0a0f1c,#05070d);
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#000;
}

.title{
  font-size:20px;
  font-weight:bold;
  background:linear-gradient(90deg,#00eaff,#ff7b00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* LOGO */
.logo{
  text-align:center;
  margin:15px;
}

.logo-box{
  display:inline-block;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 20px #00eaff;
}

.logo-box h1{
  margin:0;
  font-size:26px;
  background:linear-gradient(90deg,#00eaff,#ff7b00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GAMES */
.games{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.game{
  background:#111827;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

button{
  background:#ff7b00;
  border:none;
  padding:6px 10px;
  border-radius:5px;
  color:white;
}

/* FULL SCREEN ADS */
#adBox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:99999;
}

/* AD CARD */
.ad-card{
  width:85%;
  max-width:320px;
  background:#111827;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 20px #00eaff;
}

/* TIMER */
.timer{
  font-size:50px;
  font-weight:bold;
  color:#00eaff;
  margin:15px 0;
}

/* BUTTON */
#closeBtn{
  display:none;
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="title">TEKNOVA GAMES</div>
</div>

<!-- LOGO -->
<div class="logo">
  <div class="logo-box">
    <h1>TEKNOVA GAMES</h1>
    <p>🔥 Ultimate Gaming Hub</p>
  </div>
</div>

<!-- GAMES -->
<div class="games">

<div class="game" onclick="startAds('https://html5games.com/Game/Helix-Jump')">
<p>Helix Jump</p>
<button>Play</button>
</div>

<div class="game" onclick="startAds('https://html5games.com/Game/Flappy-Bird')">
<p>Flappy Bird</p>
<button>Play</button>
</div>

</div>

<!-- ADS SCREEN -->
<div id="adBox">
  <div class="ad-card">
    <h3>🎮 Advertisement</h3>
    <p>Please wait...</p>

    <div class="timer" id="timer">35</div>

    <button id="closeBtn">Continue</button>
  </div>
</div>

<script>

let adLink = "https://omg10.com/4/10857803"; // 🔥 YOUR ADS LINK
let nextUrl = "";
let adActive = false;

function startAds(url){

  if(adActive) return;
  adActive = true;

  nextUrl = url;

  // open ad in new tab
  window.open(adLink, "_blank");

  // show full screen lock
  document.getElementById("adBox").style.display="flex";

  let time = 35;
  let timer = document.getElementById("timer");
  let btn = document.getElementById("closeBtn");

  btn.style.display="none";

  let interval = setInterval(()=>{

    time--;
    timer.innerText = time;

    if(time <= 0){
      clearInterval(interval);
      btn.style.display="block";
    }

  },1000);
}

document.getElementById("closeBtn").onclick=function(){
  document.getElementById("adBox").style.display="none";
  adActive=false;
  window.location.href = nextUrl;
};

</script>

</body>
</html>
