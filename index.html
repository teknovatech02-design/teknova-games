<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEKNOVA GAMES</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#000428,#004e92);
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#000;
}

#search{
  padding:8px;
  border:none;
  border-radius:5px;
}

/* LOGO */
.logo{
  text-align:center;
  margin:10px;
}

.logo img{
  width:90%;
  max-width:400px;
  border-radius:10px;
}

/* GAMES */
.games{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.game{
  background:#021a3a;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.game img{
  width:100%;
  border-radius:10px;
}

button{
  margin-top:5px;
  padding:8px;
  border:none;
  background:#ff9800;
  color:white;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>🎮 TEKNOVA</h2>
  <input type="text" id="search" placeholder="Search game...">
</div>

<div class="logo">
  <img src="https://files.catbox.moe/qbrqt0.jpg">
</div>

<div class="games">

  <div class="game" onclick="playGame('https://html5games.com/Game/Helix-Jump')">
    <img src="https://img.freepik.com/free-vector/game-background-design_23-2149007810.jpg">
    <p>Helix Jump</p>
    <button>Play</button>
  </div>

  <div class="game" onclick="playGame('https://html5games.com/Game/Flappy-Bird')">
    <img src="https://img.freepik.com/free-vector/arcade-game-background_23-2148997820.jpg">
    <p>Flappy Bird</p>
    <button>Play</button>
  </div>

</div>

<script>

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let value = this.value.toLowerCase();
  let games = document.querySelectorAll(".game");

  games.forEach(game=>{
    let name = game.innerText.toLowerCase();
    game.style.display = name.includes(value) ? "block" : "none";
  });
});

/* AD LINK YAKO */
let ad = "https://omg10.com/4/10857803";

/* SAFE PROFESSIONAL METHOD */
function playGame(url){

  // Fungua ad (user click)
  let win = window.open(ad, "_blank");

  // Hakikisha haiblock
  if(!win){
    alert("Please allow popups to continue");
  }

  // Fungua game baada ya muda kidogo
  setTimeout(()=>{
    window.location.href = url;
  },1500);
}

</script>

</body>
</html>
